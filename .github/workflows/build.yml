name: Skiddy's Build Job

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/esp32-c3-devkitm-1/firmware.bin

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "SkidBGone ${{ github.ref_name }}"
          body: |
            ## SkidBGone ${{ github.ref_name }}

            ```
               _____ __   _     ______  ______
              / ___// /__(_)___/ / __ )/ ____/___  ____  ___
              \__ \/ //_/ / __  / __  / / __/ __ \/ __ \/ _ \
             ___/ / ,< / / /_/ / /_/ / /_/ / /_/ / / / /  __/
            /____/_/|_/_/\__,_/_____/\____/\____/_/ /_/\___/
            ```

            Skiddy done it's job. Flash with [SkidBGone Flasher](https://labubuahhginger.github.io/skiddysflasher).
          files: .pio/build/esp32-c3-devkitm-1/firmware.bin